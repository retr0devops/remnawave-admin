services:
  # ===========================================
  # Основные сервисы
  # ===========================================

  bot:
    image: ghcr.io/case211/remnawave-admin:latest
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      MAXMIND_CITY_DB: /app/geoip/GeoLite2-City.mmdb
      MAXMIND_ASN_DB: /app/geoip/GeoLite2-ASN.mmdb
    volumes:
      - ./logs:/app/logs
      - geoip_data:/app/geoip
    ports:
      - "${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"
    networks:
      - remnawave-network
    depends_on:
      remnawave-admin-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python -m src.main' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  remnawave-admin-db:
    container_name: remnawave-admin-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-remnawave_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs:/app/logs
    # Fix /app/logs ownership for postgres user, then start with logging_collector
    entrypoint:
      - sh
      - -c
      - >
        mkdir -p /app/logs && chown postgres:postgres /app/logs &&
        exec docker-entrypoint.sh postgres
        -c logging_collector=on
        -c log_directory=/app/logs
        -c log_filename=postgres.log
        -c log_file_mode=0644
        -c log_truncate_on_rotation=off
        -c log_rotation_size=10240
        -c log_min_messages=warning
        -c log_min_duration_statement=1000
        -c "log_line_prefix=%t [%p] "
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=1GB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c autovacuum_vacuum_scale_factor=0.05
        -c autovacuum_analyze_scale_factor=0.02
        -c autovacuum_vacuum_cost_delay=2ms
        -c autovacuum_max_workers=3
    networks:
      - remnawave-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB:-remnawave_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Веб-панель (опционально, --profile web)
  # ===========================================

  web-backend:
    image: ghcr.io/case211/remnawave-admin-web-backend:latest
    build:
      context: .
      dockerfile: ./web/backend/Dockerfile
    container_name: remnawave-web-backend
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      WEB_HOST: '0.0.0.0'
      WEB_PORT: '8081'
      MAXMIND_CITY_DB: /app/geoip/GeoLite2-City.mmdb
      MAXMIND_ASN_DB: /app/geoip/GeoLite2-ASN.mmdb
      BACKUP_DIR: /app/backups
      # Redis (опционально, нужен при >1 инстансе для общего кеша и rate limiting)
      # REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - geoip_data:/app/geoip
      - ./backups:/app/backups
    ports:
      - "${WEB_BACKEND_PORT:-8081}:8081"
      - "${MAIL_INBOUND_PORT:-2525}:${MAIL_INBOUND_PORT:-2525}"
      - "${MAIL_SUBMISSION_PORT:-587}:${MAIL_SUBMISSION_PORT:-587}"
    networks:
      - remnawave-network
    depends_on:
      remnawave-admin-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/api/v2/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web-frontend:
    image: ghcr.io/case211/remnawave-admin-web-frontend:latest
    build:
      context: ./web/frontend
      dockerfile: ./web/frontend/Dockerfile
    container_name: remnawave-web-frontend
    restart: unless-stopped
    init: true
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    ports:
      - "${WEB_FRONTEND_PORT:-3000}:80"
    networks:
      - remnawave-network
    depends_on:
      web-backend:
        condition: service_healthy

  # ===========================================
  # Redis (опционально, раскомментировать при >1 инстансе web-backend
  # для общего кеша аналитики и distributed rate limiting)
  # ===========================================

  # redis:
  #   image: redis:7-alpine
  #   container_name: remnawave-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - remnawave-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

volumes:
  postgres_data:
  geoip_data:
  # redis_data:

networks:
  remnawave-network:
    external: true
