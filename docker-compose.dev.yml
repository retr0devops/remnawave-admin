# =============================================
# Dev-окружение — использует образы с тегом :dev
# Запуск:  docker compose -f docker-compose.dev.yml up -d
# =============================================

services:
  # ===========================================
  # Основные сервисы
  # ===========================================

  bot:
    image: ghcr.io/case211/remnawave-admin:dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      MAXMIND_CITY_DB: /app/geoip/GeoLite2-City.mmdb
      MAXMIND_ASN_DB: /app/geoip/GeoLite2-ASN.mmdb
    volumes:
      - ./logs:/app/logs
      - geoip_data:/app/geoip
    ports:
      - "${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"
    networks:
      - remnawave-network
    depends_on:
      remnawave-admin-db:
        condition: service_healthy

  remnawave-admin-db:
    container_name: remnawave-admin-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-remnawave_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs:/app/logs
    # Fix /app/logs ownership for postgres user, then start with logging_collector
    entrypoint:
      - sh
      - -c
      - >
        mkdir -p /app/logs && chown postgres:postgres /app/logs &&
        exec docker-entrypoint.sh postgres
        -c logging_collector=on
        -c log_directory=/app/logs
        -c log_filename=postgres.log
        -c log_file_mode=0644
        -c log_truncate_on_rotation=off
        -c log_rotation_size=10240
        -c log_min_messages=warning
        -c log_min_duration_statement=1000
        -c "log_line_prefix=%t [%p] "
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=1GB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c autovacuum_vacuum_scale_factor=0.05
        -c autovacuum_analyze_scale_factor=0.02
        -c autovacuum_vacuum_cost_delay=2ms
        -c autovacuum_max_workers=3
    networks:
      - remnawave-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB:-remnawave_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Веб-панель
  # ===========================================

  web-backend:
    image: ghcr.io/case211/remnawave-admin-web-backend:dev
    build:
      context: .
      dockerfile: ./web/backend/Dockerfile
    container_name: remnawave-web-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WEB_HOST: '0.0.0.0'
      WEB_PORT: '8081'
      MAXMIND_CITY_DB: /app/geoip/GeoLite2-City.mmdb
      MAXMIND_ASN_DB: /app/geoip/GeoLite2-ASN.mmdb
    volumes:
      - ./logs:/app/logs
      - geoip_data:/app/geoip
    ports:
      - "${WEB_BACKEND_PORT:-8081}:8081"
    networks:
      - remnawave-network
    depends_on:
      remnawave-admin-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/api/v2/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-frontend:
    image: ghcr.io/case211/remnawave-admin-web-frontend:dev
    build:
      context: ./web/frontend
      dockerfile: ./web/frontend/Dockerfile
    container_name: remnawave-web-frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    ports:
      - "${WEB_FRONTEND_PORT:-3000}:80"
    networks:
      - remnawave-network
    depends_on:
      - web-backend

volumes:
  postgres_data:
  geoip_data:

networks:
  remnawave-network:
    external: true
